<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>K-Smart AI Web Container</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); font-family: -apple-system, system-ui, sans-serif; overflow: hidden; color: var(--text); }
        
        /* 세련된 로딩/설정 화면 */
        #setup-screen {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            padding: 30px; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .setup-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 32px;
            padding: 50px 30px; width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { font-weight: 900; margin-bottom: 35px; letter-spacing: -0.06rem; font-size: 1.8rem; }
        
        /* 입력 섹션 */
        .input-group { margin-bottom: 24px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 800; color: #94a3b8; margin-bottom: 10px; margin-left: 10px; text-transform: uppercase; }
        input {
            width: 100%; padding: 18px 22px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2); }
        
        /* 프리미엄 버튼 */
        .btn-start {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: #fff; font-size: 1.2rem; font-weight: 900; cursor: pointer;
            margin-top: 30px; box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
            transition: 0.3s;
        }
        .btn-start:active { transform: scale(0.97); filter: brightness(1.1); }
        
        /* 풀 화면 웹뷰 */
        #webview-frame {
            width: 100%; height: 100%; border: none; display: none;
            background: #fff; transition: 1s ease;
        }
        
        /* 브랜딩 로고 */
        .loading-logo { 
            width: 90px; height: 90px; margin-bottom: 25px; border-radius: 24px; 
            object-fit: contain; background: rgba(255,255,255,0.05); padding: 5px;
            animation: bounce 2s infinite; 
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>

    <!-- 설정 창 (K-Smart AI 프리셋 적용) -->
    <div id="setup-screen">
        <div class="setup-card">
            <img src="https://www.ksmartai.com/common/ksa_logo.svg" class="loading-logo" alt="Logo">
            <h2>K-Smart AI <span style="color:var(--primary)">Apps</span></h2>
            
            <div class="input-group">
                <label>서버 로고 주소</label>
                <input type="text" id="logo-url" value="https://www.ksmartai.com/common/ksa_logo.svg">
            </div>
            
            <div class="input-group">
                <label>접속 서버 주소</label>
                <input type="text" id="web-url" value="https://www.ksmartai.com">
            </div>
            
            <p style="font-size:0.8rem; color:#64748b; margin-top:-10px;">설정 후 다시 시작할 때 바로 접속됩니다.</p>
            
            <button class="btn-start" onclick="startApp()">앱 환경 구축 및 시작 🚀</button>
        </div>
    </div>

    <!-- 실제 서비스 웹 아이프레임 -->
    <iframe id="webview-frame" allow="camera; microphone; geolocation;"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('app_url');
            if (savedUrl) {
                // 이미 설정되어 있다면 바로 앱 실행
                launch(savedUrl);
            }
        });

        function startApp() {
            const url = document.getElementById('web-url').value.trim();
            const logo = document.getElementById('logo-url').value.trim();
            
            if (!url.startsWith('http')) {
                alert('정확한 URL 형식을 입력해주세요.'); return;
            }
            
            localStorage.setItem('app_url', url);
            localStorage.setItem('app_logo', logo);
            launch(url);
        }

        function launch(url) {
            const setup = document.getElementById('setup-screen');
            const frame = document.getElementById('webview-frame');
            
            setup.style.opacity = '0';
            setup.style.transform = 'scale(1.1)';
            setTimeout(() => {
                setup.style.display = 'none';
                frame.src = url;
                frame.style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
